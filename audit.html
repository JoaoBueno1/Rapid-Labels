<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Audit — Rapid Label</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/svg+xml" href="icon-192.svg">
  <style>
    /* ── Tab System ── */
    .audit-tabs { display:flex; gap:0; border-bottom:2px solid #e2e8f0; margin-top:8px }
    .audit-tab { padding:10px 24px; font-size:14px; font-weight:600; color:#64748b; background:none; border:none; border-bottom:3px solid transparent; cursor:pointer; transition:all .2s }
    .audit-tab:hover { color:#334155; background:#f8fafc }
    .audit-tab.active { color:#7c3aed; border-bottom-color:#7c3aed }
    .audit-tab .tab-badge { display:inline-flex; align-items:center; justify-content:center; min-width:20px; height:18px; padding:0 5px; border-radius:999px; font-size:10px; font-weight:700; line-height:1; background:rgba(0,0,0,.1); color:currentColor; margin-left:6px }
    .audit-tab.active .tab-badge { background:rgba(124,58,237,.15); color:#7c3aed }

    .tab-content { display:none }
    .tab-content.active { display:block }

    /* ── Filter Bar ── */
    .audit-filters { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-top:12px; padding:10px 0 }
    .audit-filters .chip { padding:4px 10px; border:1px solid #cbd5e1; border-radius:999px; background:#fff; color:#0f172a; font-size:12px; cursor:pointer; display:inline-flex; align-items:center; gap:6px; transition:all .2s }
    .audit-filters .chip.active { border-width:2px; font-weight:700; transform:scale(1.05); box-shadow:0 2px 8px rgba(0,0,0,.15) }
    .audit-filters.has-active .chip:not(.active) { opacity:.35; filter:grayscale(.6); transform:scale(.96) }
    .audit-filters.has-active .chip:not(.active):hover { opacity:.6; filter:grayscale(.3); transform:scale(1) }
    .chip-count { display:inline-flex; align-items:center; justify-content:center; min-width:18px; height:16px; padding:0 4px; border-radius:999px; font-size:10px; font-weight:700; background:rgba(0,0,0,.1); color:currentColor }

    /* ── Movement Type Chips ── */
    .chip.sales_pick, .chip.sales_ship  { background:#fee2e2; color:#b91c1c; border-color:#fecaca }
    .chip.stock_transfer, .chip.bin_transfer { background:#dbeafe; color:#1d4ed8; border-color:#bfdbfe }
    .chip.stock_adjustment { background:#fef3c7; color:#b45309; border-color:#fde68a }
    .chip.purchase_receive { background:#dcfce7; color:#15803d; border-color:#bbf7d0 }
    .chip.snapshot_delta   { background:#f5f3ff; color:#7c3aed; border-color:#ddd6fe }

    /* ── Table ── */
    .audit-table th,
    .audit-table td { text-align:left; padding:8px 12px; font-size:13px }
    .audit-table th { position:sticky; top:0; background:#f8fafc; z-index:1; font-weight:700; color:#334155 }
    .audit-table tbody tr { transition: background .15s }
    .audit-table tbody tr:hover { background:#f8fafc }
    .audit-table tbody tr.anomaly { background:#fff7ed }
    .audit-table tbody tr.internal { opacity:.5 }
    .audit-table tbody tr.internal:hover { opacity:.85 }

    /* ── Movement Type Badge ── */
    .mvmt-badge { display:inline-block; font-size:11px; padding:2px 8px; border-radius:999px; font-weight:600; line-height:1.4; border:1px solid transparent; white-space:nowrap }
    .mvmt-badge.sales_pick, .mvmt-badge.sales_ship  { background:#fee2e2; color:#b91c1c; border-color:#fecaca }
    .mvmt-badge.stock_transfer { background:#dbeafe; color:#1d4ed8; border-color:#bfdbfe }
    .mvmt-badge.bin_transfer   { background:#e0e7ff; color:#4338ca; border-color:#c7d2fe }
    .mvmt-badge.stock_adjustment { background:#fef3c7; color:#b45309; border-color:#fde68a }
    .mvmt-badge.purchase_receive { background:#dcfce7; color:#15803d; border-color:#bbf7d0 }
    .mvmt-badge.snapshot_delta   { background:#f5f3ff; color:#7c3aed; border-color:#ddd6fe }

    /* ── Qty Badge ── */
    .qty-badge { font-weight:700; font-variant-numeric:tabular-nums }
    .qty-badge.negative { color:#dc2626 }
    .qty-badge.positive { color:#16a34a }

    /* ── Direction Arrow ── */
    .direction-arrow { color:#94a3b8; font-weight:900; font-size:14px; margin:0 4px }

    /* ── Alert severity badges ── */
    .severity-badge { display:inline-block; font-size:11px; padding:2px 8px; border-radius:999px; font-weight:700; border:1px solid transparent; text-transform:uppercase }
    .severity-badge.critical { background:#fee2e2; color:#b91c1c; border-color:#fecaca }
    .severity-badge.warning  { background:#fef3c7; color:#b45309; border-color:#fde68a }
    .severity-badge.info     { background:#dbeafe; color:#1d4ed8; border-color:#bfdbfe }

    /* ── Alert card ── */
    .alert-card { margin-bottom:10px; padding:12px 16px; border:1px solid #e2e8f0; border-radius:10px; background:#fff; transition:all .2s }
    .alert-card:hover { box-shadow:0 2px 8px rgba(0,0,0,.08) }
    .alert-card.critical { border-left:4px solid #ef4444 }
    .alert-card.warning  { border-left:4px solid #f59e0b }
    .alert-card.info     { border-left:4px solid #3b82f6 }
    .alert-card .alert-header { display:flex; align-items:center; gap:10px; margin-bottom:6px }
    .alert-card .alert-title { font-weight:700; font-size:14px; color:#0f172a; flex:1 }
    .alert-card .alert-time  { font-size:12px; color:#94a3b8 }
    .alert-card .alert-desc  { font-size:13px; color:#475569; line-height:1.5 }
    .alert-card .alert-meta  { display:flex; gap:12px; margin-top:8px; font-size:12px; color:#64748b; flex-wrap:wrap }
    .alert-card .alert-meta span { display:inline-flex; align-items:center; gap:4px }
    .alert-card .ack-btn { padding:4px 12px; font-size:11px; border:1px solid #cbd5e1; border-radius:6px; background:#fff; color:#475569; cursor:pointer; transition:all .15s }
    .alert-card .ack-btn:hover { background:#f8fafc; border-color:#94a3b8 }
    .alert-card.acknowledged { opacity:.4 }

    /* ── Product detail panel ── */
    .product-detail-panel { margin-top:12px; padding:16px; border:1px solid #e2e8f0; border-radius:12px; background:#f8fafc }
    .product-detail-panel h3 { margin:0 0 8px; font-size:16px; color:#0f172a }
    .product-detail-stats { display:flex; gap:16px; flex-wrap:wrap; margin-bottom:12px }
    .product-detail-stats .stat-card { padding:10px 14px; background:#fff; border:1px solid #e2e8f0; border-radius:8px; min-width:120px }
    .product-detail-stats .stat-label { font-size:11px; color:#94a3b8; text-transform:uppercase; font-weight:600 }
    .product-detail-stats .stat-value { font-size:20px; font-weight:800; color:#0f172a; margin-top:2px }

    /* ── Date range inputs ── */
    .date-range { display:inline-flex; align-items:center; gap:6px; font-size:13px }
    .date-range input[type="date"] { padding:4px 8px; border:1px solid #cbd5e1; border-radius:6px; font-size:12px; color:#334155 }
    .date-range label { color:#64748b; font-weight:500 }

    /* ── Skeleton loading ── */
    .skeleton-row td { height:22px }
    .skeleton-bar { height:14px; background:linear-gradient(90deg,#e2e8f0 25%,#f1f5f9 50%,#e2e8f0 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:4px; width:80% }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ── Pager ── */
    .pager button[disabled] { opacity:.5; cursor:not-allowed }
    .pager { display:flex; justify-content:flex-end; align-items:center; gap:8px; margin-top:8px }

    /* ── Responsive ── */
    @media(max-width:768px) {
      .audit-filters { gap:6px }
      .audit-table th, .audit-table td { padding:6px 8px; font-size:12px }
      .product-detail-stats { flex-direction:column }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="left">
        <a class="back-link" href="index.html">← Back</a>
        <a class="brand" href="index.html">JSlab.dev</a>
      </div>
      <nav class="site-nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="restock-v2.html" class="nav-link">Re-Stock V2</a>
        <a href="gateway-main.html" class="nav-link">Gateway → Main</a>
        <a href="audit.html" class="nav-link active">Stock Audit</a>
      </nav>
    </div>
  </header>

  <div class="main-container wide-container">
    <!-- Page Header -->
    <div class="page-header">
      <div style="display:flex;align-items:center;gap:20px">
        <h1 style="margin:0">Stock Audit <span style="font-size:14px;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;padding:2px 10px;border-radius:999px;vertical-align:middle">Live</span></h1>
      </div>
      <div class="header-actions">
        <div class="search-input-group">
          <input type="text" id="auditSearch" placeholder="Search SKU or Product name…" style="min-width:380px" />
          <button class="search-btn-small" onclick="window.auditApp.search()">Search</button>
        </div>
      </div>
    </div>

    <!-- Sync Status -->
    <div id="syncStatusCard" style="margin-top:8px;display:flex;align-items:center;gap:12px;padding:10px 16px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px">
      <div style="display:flex;align-items:center;gap:6px">
        <span id="syncStatusDot" style="width:10px;height:10px;border-radius:50%;background:#94a3b8;display:inline-block"></span>
        <span id="syncStatusText" style="font-size:13px;color:#475569;font-weight:500">Checking…</span>
      </div>
      <div style="flex:1"></div>
      <span id="syncStatusTime" style="font-size:12px;color:#94a3b8"></span>
    </div>

    <!-- Product Detail Panel (shown when filtering by a single product) -->
    <div id="productDetailPanel" class="product-detail-panel" style="display:none">
      <div style="display:flex;align-items:center;gap:12px">
        <h3 id="productDetailTitle">Product Details</h3>
        <button onclick="window.auditApp.clearProductFilter()" style="font-size:12px;padding:3px 10px;border:1px solid #cbd5e1;border-radius:6px;background:#fff;cursor:pointer;color:#64748b">✕ Clear filter</button>
      </div>
      <div class="product-detail-stats" id="productDetailStats"></div>
    </div>

    <!-- Tabs -->
    <div class="audit-tabs">
      <button class="audit-tab active" data-tab="movements" onclick="window.auditApp.switchTab('movements',this)">
        📋 Movements <span class="tab-badge" id="movementsBadge">0</span>
      </button>
      <button class="audit-tab" data-tab="alerts" onclick="window.auditApp.switchTab('alerts',this)">
        🚨 Alerts <span class="tab-badge" id="alertsBadge">0</span>
      </button>
    </div>

    <!-- ═══ Movements Tab ═══ -->
    <div class="tab-content active" id="tabMovements">
      <!-- Filters -->
      <div class="audit-filters" id="movementFilters">
        <span style="font-weight:600;color:#475569;font-size:13px">Type:</span>
        <button class="chip active" data-type-filter="ALL" onclick="window.auditApp.setTypeFilter('ALL',this)">
          All <span class="chip-count" id="countAll">0</span>
        </button>
        <button class="chip sales_pick" data-type-filter="SALES" onclick="window.auditApp.setTypeFilter('SALES',this)">
          Sales <span class="chip-count" id="countSales">0</span>
        </button>
        <button class="chip stock_transfer" data-type-filter="TRANSFER" onclick="window.auditApp.setTypeFilter('TRANSFER',this)">
          Transfers <span class="chip-count" id="countTransfer">0</span>
        </button>
        <button class="chip stock_adjustment" data-type-filter="ADJUSTMENT" onclick="window.auditApp.setTypeFilter('ADJUSTMENT',this)">
          Adjustments <span class="chip-count" id="countAdjustment">0</span>
        </button>
        <button class="chip purchase_receive" data-type-filter="PURCHASE" onclick="window.auditApp.setTypeFilter('PURCHASE',this)">
          Purchases <span class="chip-count" id="countPurchase">0</span>
        </button>
        <button class="chip snapshot_delta" data-type-filter="DELTA" onclick="window.auditApp.setTypeFilter('DELTA',this)">
          Snapshot Δ <span class="chip-count" id="countDelta">0</span>
        </button>

        <div style="width:1px;height:20px;background:#ddd;margin:0 4px"></div>

        <label style="display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#64748b;cursor:pointer">
          <input type="checkbox" id="hideInternal" onchange="window.auditApp.toggleHideInternal(this.checked)" checked />
          Hide internal (bin↔bin)
        </label>

        <div style="flex:1"></div>

        <div class="date-range">
          <label>From</label>
          <input type="date" id="dateFrom" onchange="window.auditApp.setDateRange()" />
          <label>To</label>
          <input type="date" id="dateTo" onchange="window.auditApp.setDateRange()" />
        </div>
      </div>

      <!-- Table -->
      <div class="table-wrapper" style="max-height:65vh;overflow-y:auto">
        <table class="app-table audit-table" id="movementsTable">
          <thead>
            <tr>
              <th style="width:130px">Date</th>
              <th>Type</th>
              <th>SKU</th>
              <th>Product</th>
              <th>From → To</th>
              <th style="text-align:center">Qty</th>
              <th>Reference</th>
              <th>Who</th>
              <th>Source</th>
            </tr>
          </thead>
          <tbody id="movementsTbody">
            <tr><td colspan="9" style="text-align:center;opacity:.7;padding:32px">Loading movements…</td></tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div class="pager" id="movementsPager">
        <span id="movementsTotal" class="small-note" style="margin-right:auto;color:#64748b"></span>
        <button id="mvtPrevPage" class="pages-btn" type="button" onclick="window.auditApp.mvtPrevPage()" disabled>‹</button>
        <span id="mvtPageInfo" class="small-note">Page 1 / 1</span>
        <button id="mvtNextPage" class="pages-btn" type="button" onclick="window.auditApp.mvtNextPage()" disabled>›</button>
      </div>
    </div>

    <!-- ═══ Alerts Tab ═══ -->
    <div class="tab-content" id="tabAlerts">
      <!-- Alert Filters -->
      <div class="audit-filters" id="alertFilters">
        <span style="font-weight:600;color:#475569;font-size:13px">Severity:</span>
        <button class="chip active" data-alert-filter="ALL" onclick="window.auditApp.setAlertFilter('ALL',this)">
          All <span class="chip-count" id="alertCountAll">0</span>
        </button>
        <button class="chip" data-alert-filter="critical" onclick="window.auditApp.setAlertFilter('critical',this)" style="background:#fee2e2;color:#b91c1c;border-color:#fecaca">
          Critical <span class="chip-count" id="alertCountCritical">0</span>
        </button>
        <button class="chip" data-alert-filter="warning" onclick="window.auditApp.setAlertFilter('warning',this)" style="background:#fef3c7;color:#b45309;border-color:#fde68a">
          Warning <span class="chip-count" id="alertCountWarning">0</span>
        </button>
        <button class="chip" data-alert-filter="info" onclick="window.auditApp.setAlertFilter('info',this)" style="background:#dbeafe;color:#1d4ed8;border-color:#bfdbfe">
          Info <span class="chip-count" id="alertCountInfo">0</span>
        </button>

        <div style="width:1px;height:20px;background:#ddd;margin:0 4px"></div>

        <label style="display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#64748b;cursor:pointer">
          <input type="checkbox" id="hideAcknowledged" onchange="window.auditApp.toggleHideAcknowledged(this.checked)" checked />
          Hide acknowledged
        </label>

        <div style="flex:1"></div>

        <button class="search-btn-small" onclick="window.auditApp.acknowledgeAll()" style="font-size:11px;padding:4px 12px">✓ Acknowledge all visible</button>
      </div>

      <!-- Alert Cards -->
      <div id="alertsList" style="margin-top:8px">
        <div style="text-align:center;opacity:.7;padding:32px">Loading alerts…</div>
      </div>

      <!-- Alert Pagination -->
      <div class="pager" id="alertsPager">
        <span id="alertsTotal" class="small-note" style="margin-right:auto;color:#64748b"></span>
        <button id="alertPrevPage" class="pages-btn" type="button" onclick="window.auditApp.alertPrevPage()" disabled>‹</button>
        <span id="alertPageInfo" class="small-note">Page 1 / 1</span>
        <button id="alertNextPage" class="pages-btn" type="button" onclick="window.auditApp.alertNextPage()" disabled>›</button>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-inner">© 2025 JSlab.dev — All rights reserved.</div>
  </footer>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="audit.js"></script>
</body>
</html>
