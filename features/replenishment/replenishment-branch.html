<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Branch Plan</title>
  <link rel="stylesheet" href="../../styles.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link rel="manifest" href="../../manifest.json">
  <meta name="theme-color" content="#232946">
  <link rel="icon" type="image/svg+xml" href="../../icon-192.svg">
  <style>
    .main-container { max-width: 1440px; }

    /* ── Summary Bar ── */
    .summary-bar {
      display: none;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      padding: 10px 14px;
      background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 100%);
      border: 1px solid #bbf7d0;
      border-radius: 10px;
      font-size: 13px;
      color: #166534;
      margin: 10px 0;
    }
    .sum-item { display: inline-flex; align-items: center; gap: 3px; }
    .sum-sep { color: #86efac; margin: 0 2px; }
    .sum-crit { color: #dc2626; }
    .sum-warn { color: #d97706; }

    /* ── Filter Bar ── */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin: 10px 0;
      padding: 8px 12px;
      background: #f8fafc;
      border-radius: 8px;
    }
    .filter-chip {
      padding: 5px 10px;
      border-radius: 20px;
      border: 1px solid #e2e8f0;
      background: white;
      font-size: 11px;
      font-weight: 600;
      color: #475569;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .filter-chip:hover { background: #f1f5f9; border-color: #94a3b8; }
    .filter-chip.active { background: #059669; color: white; border-color: #059669; }
    .filter-chip .chip-count {
      font-size: 10px;
      opacity: 0.8;
      background: rgba(0,0,0,0.1);
      padding: 1px 5px;
      border-radius: 8px;
      min-width: 18px;
      text-align: center;
    }
    .filter-chip.active .chip-count { background: rgba(255,255,255,0.25); }

    /* ── Snapshot Badge ── */
    .snapshot-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: #f0f9ff;
      border: 1px solid #bae6fd;
      border-radius: 8px;
      font-size: 11px;
      color: #0369a1;
    }

    /* ── Action Buttons ── */
    .action-bar {
      display: flex;
      gap: 8px;
      margin: 12px 0;
      flex-wrap: wrap;
      align-items: center;
    }
    .btn-action {
      padding: 7px 14px;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      background: white;
      font-size: 12px;
      font-weight: 600;
      color: #334155;
      cursor: pointer;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .btn-action:hover { background: #f8fafc; border-color: #94a3b8; }
    .btn-action.primary { background: #059669; color: white; border-color: #059669; }
    .btn-action.primary:hover { background: #047857; }
    .selection-badge {
      background: #6366f1;
      color: white;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }

    /* ── Table ── */
    #planTable { width: 100%; font-size: 12px; border-collapse: collapse; }
    #planTable th, #planTable td { vertical-align: middle; padding: 7px 8px; white-space: nowrap; }
    #planTable th {
      text-align: center;
      font-size: 10px;
      font-weight: 700;
      color: #64748b;
      background: #f8fafc;
      border-bottom: 2px solid #e2e8f0;
      position: sticky;
      top: 0;
      z-index: 2;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    #planTable td { text-align: center; border-bottom: 1px solid #f1f5f9; }
    #planTable tbody tr:hover { background: #f0fdf4; }
    #planTable tbody tr:hover td { opacity: 1 !important; }

    .check-cell { width: 32px; text-align: center !important; }
    .row-check { cursor: pointer; width: 14px; height: 14px; accent-color: #059669; }

    .product-cell {
      text-align: left !important;
      max-width: 280px;
      white-space: normal;
    }
    .prod-code { font-weight: 600; font-size: 12px; color: #0f172a; }
    .prod-name { font-size: 10px; color: #64748b; line-height: 1.3; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 260px; }
    .prod-meta { font-size: 9px; color: #94a3b8; margin-top: 1px; }
    .prod-dc { font-family: monospace; }
    .conflict-dot { cursor: help; font-size: 11px; }

    .loc-cell { font-family: 'SF Mono', monospace; font-size: 11px; color: #475569; text-align: left !important; }
    .num-cell { font-variant-numeric: tabular-nums; }
    .main-cell { color: #64748b; font-size: 11px; background: #fafbfc; }
    .tip-cell { cursor: help; text-decoration: underline dotted #cbd5e1; text-underline-offset: 2px; }

    .cover-cell { }
    .cover-badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
    }
    .cover-crit { background: #fef2f2; color: #dc2626; }
    .cover-warn { background: #fffbeb; color: #d97706; }
    .cover-ok { background: #f0fdf4; color: #16a34a; }
    .cover-suf { background: #f0f9ff; color: #0284c7; }
    .cover-na { background: #f1f5f9; color: #94a3b8; }

    .send-cell { font-weight: 600; }
    .send-val { color: #059669; font-size: 14px; }
    .send-blocked { color: #dc2626; font-size: 11px; cursor: help; }
    .send-dim { color: #cbd5e1; font-size: 11px; }
    .send-ok { color: #10b981; font-size: 14px; }

    .transit-cell { background: #fefce8; }
    .transit-val { color: #b45309; font-weight: 700; font-size: 12px; cursor: help; text-decoration: underline dotted #d97706; text-underline-offset: 2px; }

    .rnd-badge { font-size: 9px; font-weight: 700; padding: 0 3px; border-radius: 3px; margin-left: 2px; cursor: help; }
    .rnd-up { background: #d1fae5; color: #065f46; }
    .rnd-down { background: #fef3c7; color: #92400e; }

    .ctn-cell { color: #64748b; font-size: 12px; font-weight: 600; }

    .dim-row td { opacity: 0.45; }
    .dim-row:hover td { opacity: 0.8 !important; }

    .sortable { cursor: pointer; user-select: none; }
    .sortable:hover { color: #059669; }
    .sort-icon { font-size: 9px; opacity: 0.3; margin-left: 1px; }
    .sort-icon.active { opacity: 1; color: #059669; }

    .table-scroll-wrapper {
      overflow-x: auto;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      background: white;
    }

    .alert { padding: 10px 14px; border-radius: 8px; margin-bottom: 10px; font-size: 12px; }
    .alert.warning { background: #fef3c7; border: 1px solid #fcd34d; color: #92400e; }

    /* ── Cartons Only Toggle ── */
    .btn-carton-mode {
      padding: 7px 14px;
      border-radius: 8px;
      border: 2px solid #7c3aed;
      background: white;
      font-size: 12px;
      font-weight: 600;
      color: #7c3aed;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-carton-mode:hover { background: #f5f3ff; }
    .btn-carton-mode.active { background: #7c3aed; color: white; }

    /* ── Pending TRs Panel ── */
    .pending-tr-panel {
      display: none;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 8px 14px;
      background: #fefce8;
      border: 1px solid #fde68a;
      border-radius: 10px;
      font-size: 12px;
      color: #92400e;
      margin: 6px 0;
    }
    .tr-tag {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 8px;
      background: white;
      border: 1px solid #fcd34d;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      cursor: help;
    }
    .tr-tag small { font-weight: 400; color: #a16207; }

    .sum-transit { color: #b45309; }

    /* ── Sold/Committed Stock ── */
    .sold-deficit-cell { background: #fef2f2 !important; }
    .sold-deficit-val { color: #dc2626; font-weight: 700; font-size: 13px; }
    .sold-badge { font-size: 9px; color: #dc2626; font-weight: 600; margin-top: 1px; white-space: nowrap; }
    .committed-badge { font-size: 9px; color: #d97706; margin-top: 1px; white-space: nowrap; }
    .short-badge { font-size: 9px; color: #dc2626; font-weight: 700; margin-top: 1px; cursor: help; text-decoration: underline dotted #dc2626; text-underline-offset: 2px; }

    /* ── Carton Rules ── */
    .carton-rules {
      font-size: 10px;
      color: #7c3aed;
      background: #f5f3ff;
      border: 1px solid #ddd6fe;
      border-radius: 6px;
      padding: 3px 8px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="left">
        <a class="brand" href="../../index.html">JSlab.dev</a>
      </div>
      <nav class="site-nav">
        <a href="../../index.html" class="nav-link">Home</a>
        <a href="replenishment.html" class="nav-link">Replenishment</a>
      </nav>
    </div>
  </header>

  <main class="main-container">
    <!-- Header -->
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;margin-bottom:6px">
      <div>
        <a href="replenishment.html" style="font-size:11px;color:#059669;text-decoration:none;font-weight:500">&larr; All Branches</a>
        <h1 style="margin:4px 0 0;font-size:20px;color:#0f172a;display:flex;align-items:center;gap:8px">
          <span id="branchName">Loading...</span>
          <span id="branchCode" style="font-size:12px;color:#64748b;font-weight:400"></span>
        </h1>
      </div>
      <div class="snapshot-badge">
        📡 Cin7: <strong id="snapshotDate">—</strong>
      </div>
    </div>

    <div id="alertContainer"></div>

    <!-- Summary Bar -->
    <div id="summaryBar" class="summary-bar"></div>

    <!-- Action Bar -->
    <div class="action-bar">
      <button id="printBtn" class="btn-action primary" onclick="printTransferSheet()">🖨️ Print Sheet</button>
      <button id="exportBtn" class="btn-action" onclick="exportPlan()">📥 Export CSV</button>
      <button class="btn-action" onclick="generatePlan()" title="Reload data from Cin7">↻ Refresh</button>
      <button id="cartonModeBtn" class="btn-carton-mode" onclick="toggleCartonMode()" title="Full cartons only — Min 1 ctn, max 6 months AVG, respects Main safety stock, skips products without CTN info">📦 Cartons Only</button>
      <span id="cartonModeRules" class="carton-rules" style="display:none">Min 1 ctn · Max 6mth AVG · Main safety kept · No partial ctns</span>
      <span id="selectionBadge" class="selection-badge" style="display:none">0 selected</span>
    </div>

    <!-- Pending TRs Panel -->
    <div id="pendingTRPanel" class="pending-tr-panel"></div>

    <!-- Filter Bar -->
    <div class="filter-bar">
      <button class="filter-chip active" data-filter="to_send" onclick="setFilter('to_send')">📦 To Send</button>
      <button class="filter-chip" data-filter="critical" onclick="setFilter('critical')">🔴 Critical</button>
      <button class="filter-chip" data-filter="needs" onclick="setFilter('needs')">📋 All Needs</button>
      <button class="filter-chip" data-filter="conflicts" onclick="setFilter('conflicts')">⚠️ Conflicts</button>
      <button class="filter-chip" data-filter="oversold" onclick="setFilter('oversold')">🔴 Oversold</button>
      <button class="filter-chip" data-filter="all" onclick="setFilter('all')">All</button>
      <div style="border-left:1px solid #e2e8f0;height:18px;margin:0 2px"></div>
      <input type="text" id="searchInput" placeholder="Search product, name, location..."
             style="flex:1;min-width:160px;padding:6px 12px;border:1px solid #cbd5e1;border-radius:8px;font-size:12px"
             oninput="applyFilters()">
      <span id="resultCount" style="color:#64748b;font-size:11px"></span>
    </div>

    <!-- Table -->
    <div class="table-scroll-wrapper">
      <table id="planTable">
        <thead>
          <tr>
            <th class="check-cell"><input type="checkbox" id="selectAllCheck" class="row-check" onchange="toggleSelectAll()"></th>
            <th class="sortable" onclick="sortBy('product')" style="text-align:left">Product <span class="sort-icon" id="sort-product"></span></th>
            <th class="sortable" onclick="sortBy('location')" style="text-align:left">Location <span class="sort-icon" id="sort-location"></span></th>
            <th class="sortable" onclick="sortBy('cover_days')">Cover <span class="sort-icon active" id="sort-cover_days">▲</span></th>
            <th class="sortable" onclick="sortBy('branch_stock')">Branch <span class="sort-icon" id="sort-branch_stock"></span></th>
            <th class="sortable" onclick="sortBy('pending_qty')">In Transit <span class="sort-icon" id="sort-pending_qty"></span></th>
            <th class="sortable" onclick="sortBy('main_stock')">Main <span class="sort-icon" id="sort-main_stock"></span></th>
            <th class="sortable" onclick="sortBy('send_qty')">Send <span class="sort-icon" id="sort-send_qty"></span></th>
            <th>CTN</th>
          </tr>
        </thead>
        <tbody id="planTableBody">
          <tr><td colspan="9" style="text-align:center;padding:40px;color:#64748b">Loading data...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div style="display:flex;justify-content:flex-end;align-items:center;gap:8px;margin-top:10px">
      <button id="prevPageBtn" class="pages-btn" onclick="changePage(-1)">‹</button>
      <span id="pageInfo" class="small-note">Page 1 / 1</span>
      <button id="nextPageBtn" class="pages-btn" onclick="changePage(1)">›</button>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,0.85);z-index:100;align-items:center;justify-content:center">
      <div style="text-align:center">
        <div class="spinner"></div>
        <p style="margin-top:12px;color:#475569;font-size:13px">Loading data...</p>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">&copy; 2026 JSlab.dev — All rights reserved.</div>
  </footer>

  <script src="../../supabase-config.js"></script>
  <script src="replenishment-config.js?v=20260421"></script>
  <script src="replenishment-branch.js?v=20260421"></script>
</body>
</html>
