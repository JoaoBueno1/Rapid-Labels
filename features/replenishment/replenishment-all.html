<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restock All Branches</title>
  <link rel="stylesheet" href="../../styles.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link rel="manifest" href="../../manifest.json">
  <meta name="theme-color" content="#232946">
  <link rel="icon" type="image/svg+xml" href="../../icon-192.svg">
  <style>
    .main-container { max-width: 1440px; }

    .summary-bar {
      display: none;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      padding: 10px 14px;
      background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 100%);
      border: 1px solid #bbf7d0;
      border-radius: 10px;
      font-size: 13px;
      color: #166534;
      margin: 10px 0;
    }
    .sum-item { display: inline-flex; align-items: center; gap: 3px; }
    .sum-sep { color: #86efac; margin: 0 2px; }
    .sum-crit { color: #dc2626; }
    .sum-warn { color: #d97706; }

    .branch-tab-bar {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin: 12px 0;
      padding: 6px;
      background: #f8fafc;
      border-radius: 10px;
    }
    .branch-tab {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      background: transparent;
      font-size: 12px;
      font-weight: 600;
      color: #64748b;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .branch-tab:hover { background: #e2e8f0; }
    .branch-tab.active { background: #059669; color: white; }
    .branch-tab .tab-count {
      font-size: 10px;
      opacity: 0.7;
      background: rgba(0,0,0,0.08);
      padding: 1px 5px;
      border-radius: 8px;
    }
    .branch-tab.active .tab-count { background: rgba(255,255,255,0.25); }

    .action-bar {
      display: flex;
      gap: 8px;
      margin: 12px 0;
      flex-wrap: wrap;
      align-items: center;
    }
    .btn-action {
      padding: 7px 14px;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      background: white;
      font-size: 12px;
      font-weight: 600;
      color: #334155;
      cursor: pointer;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .btn-action:hover { background: #f8fafc; border-color: #94a3b8; }
    .btn-action.primary { background: #059669; color: white; border-color: #059669; }
    .btn-action.primary:hover { background: #047857; }

    #planTable { width: 100%; font-size: 12px; border-collapse: collapse; }
    #planTable th, #planTable td { vertical-align: middle; padding: 7px 8px; white-space: nowrap; }
    #planTable th {
      text-align: center;
      font-size: 10px;
      font-weight: 700;
      color: #64748b;
      background: #f8fafc;
      border-bottom: 2px solid #e2e8f0;
      position: sticky;
      top: 0;
      z-index: 2;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    #planTable td { text-align: center; border-bottom: 1px solid #f1f5f9; }
    #planTable tbody tr:hover { background: #f0fdf4; }

    .product-cell {
      text-align: left !important;
      max-width: 280px;
      white-space: normal;
    }
    .prod-code { font-weight: 600; font-size: 12px; color: #0f172a; }
    .prod-name { font-size: 10px; color: #64748b; line-height: 1.3; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 260px; }

    .num-cell { font-variant-numeric: tabular-nums; }
    .send-val { color: #059669; font-weight: 700; font-size: 13px; }
    .send-dim { color: #cbd5e1; font-size: 11px; }
    .send-blocked { color: #dc2626; font-size: 11px; }

    .branch-label { font-size: 10px; font-weight: 600; color: #475569; }

    .conflict-dot { cursor: help; font-size: 11px; }

    .table-scroll-wrapper {
      overflow-x: auto;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      background: white;
    }

    .alert { padding: 10px 14px; border-radius: 8px; margin-bottom: 10px; font-size: 12px; }
    .alert.warning { background: #fef3c7; border: 1px solid #fcd34d; color: #92400e; }

    .snapshot-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: #f0f9ff;
      border: 1px solid #bae6fd;
      border-radius: 8px;
      font-size: 11px;
      color: #0369a1;
    }

    .sold-deficit-val { color: #dc2626; font-weight: 700; }
    .safety-badge { font-size: 9px; color: #dc2626; font-weight: 700; }
    .short-badge { font-size: 9px; color: #dc2626; font-weight: 700; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="left">
        <a class="brand" href="../../index.html">JSlab.dev</a>
      </div>
      <nav class="site-nav">
        <a href="../../index.html" class="nav-link">Home</a>
        <a href="replenishment.html" class="nav-link">Replenishment</a>
      </nav>
    </div>
  </header>

  <main class="main-container">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;margin-bottom:6px">
      <div>
        <a href="replenishment.html" style="font-size:11px;color:#059669;text-decoration:none;font-weight:500">&larr; All Branches</a>
        <h1 style="margin:4px 0 0;font-size:20px;color:#0f172a">📦 Restock All Branches</h1>
        <p style="margin:2px 0 0;font-size:12px;color:#64748b">Consolidated distribution — Main stock split across all branches at once</p>
      </div>
      <div class="snapshot-badge">
        📡 Cin7: <strong id="snapshotDate">—</strong>
      </div>
    </div>

    <div id="alertContainer"></div>

    <div id="summaryBar" class="summary-bar"></div>

    <div class="action-bar">
      <button class="btn-action primary" onclick="exportExcel()">📥 Export Excel (1 sheet/branch)</button>
      <button class="btn-action" onclick="location.reload()">↻ Refresh</button>
    </div>

    <!-- Branch Tabs -->
    <div class="branch-tab-bar" id="branchTabs"></div>

    <!-- Table -->
    <div class="table-scroll-wrapper">
      <table id="planTable">
        <thead>
          <tr>
            <th style="text-align:left">Product</th>
            <th>Main Stock</th>
            <th>Main Safety</th>
            <th>Can Send</th>
            <th id="branchHeaders"><!-- dynamic branch columns --></th>
          </tr>
        </thead>
        <tbody id="planTableBody">
          <tr><td colspan="10" style="text-align:center;padding:40px;color:#64748b">Loading data...</td></tr>
        </tbody>
      </table>
    </div>

    <div id="loadingOverlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,0.85);z-index:100;align-items:center;justify-content:center">
      <div style="text-align:center">
        <div class="spinner"></div>
        <p style="margin-top:12px;color:#475569;font-size:13px">Loading data...</p>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">&copy; 2026 JSlab.dev — All rights reserved.</div>
  </footer>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="../../supabase-config.js"></script>
  <script src="replenishment-config.js?v=20260421"></script>
  <script src="replenishment-all.js?v=20260421"></script>
</body>
</html>
