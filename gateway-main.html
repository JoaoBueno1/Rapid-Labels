<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gateway → Main — Rapid Label</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/svg+xml" href="icon-192.svg">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="left">
        <a class="back-link" href="index.html">← Back</a>
        <a class="brand" href="index.html">JSlab.dev</a>
      </div>
      <nav class="site-nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="restock-v2.html" class="nav-link">Re-Stock V2</a>
        <a href="gateway-main.html" class="nav-link active">Gateway → Main</a>
        <a href="features/replenishment/replenishment.html" class="nav-link">Branch Replenishment</a>
      </nav>
    </div>
  </header>

  <div class="main-container wide-container">
    <!-- Page header -->
    <div class="page-header">
      <div style="display:flex;align-items:center;gap:20px">
        <h1 style="margin:0">Gateway → Main <span style="font-size:14px;background:linear-gradient(135deg,#0ea5e9,#0284c7);color:#fff;padding:2px 10px;border-radius:999px;vertical-align:middle">V2</span></h1>
      </div>
      <div class="header-actions">
        <div class="search-input-group">
          <input type="text" id="gwSearch" placeholder="Search SKU, Product or Pickface…" style="min-width:380px" />
          <button class="search-btn-small" onclick="runGwSearch()">Search</button>
        </div>
      </div>
    </div>

    <!-- Sync Status Card -->
    <div id="syncStatusCard" style="margin-top:8px;display:flex;align-items:center;gap:12px;padding:10px 16px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px">
      <div style="display:flex;align-items:center;gap:6px">
        <span id="syncStatusDot" style="width:10px;height:10px;border-radius:50%;background:#94a3b8;display:inline-block"></span>
        <span id="syncStatusText" style="font-size:13px;color:#475569;font-weight:500">Checking sync status…</span>
      </div>
      <div style="flex:1"></div>
      <span id="syncStatusTime" style="font-size:12px;color:#94a3b8"></span>
    </div>

    <!-- Filters -->
    <div style="margin-top:8px">
      <div id="gwFilters" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span style="font-weight:600;color:#475569">Weeks:</span>
        <button class="chip active" data-weeks-filter="ALL" onclick="setWeeksFilter('ALL',this)">
          All <span id="countAll" class="status-count">0</span>
        </button>
        <button class="chip" data-weeks-filter="CRITICAL" onclick="setWeeksFilter('CRITICAL',this)" style="background:#fee2e2;color:#b91c1c;border-color:#fecaca">
          &lt; 1 wk <span id="countCritical" class="status-count">0</span>
        </button>
        <button class="chip" data-weeks-filter="LOW" onclick="setWeeksFilter('LOW',this)" style="background:#fef3c7;color:#b45309;border-color:#fde68a">
          1–2 wks <span id="countLow" class="status-count">0</span>
        </button>
        <button class="chip" data-weeks-filter="OK" onclick="setWeeksFilter('OK',this)" style="background:#dcfce7;color:#15803d;border-color:#bbf7d0">
          2–4 wks <span id="countOk" class="status-count">0</span>
        </button>
        <button class="chip" data-weeks-filter="GOOD" onclick="setWeeksFilter('GOOD',this)" style="background:#dbeafe;color:#1d4ed8;border-color:#bfdbfe">
          4+ wks <span id="countGood" class="status-count">0</span>
        </button>
        <button class="chip" data-weeks-filter="NO_SALES" onclick="setWeeksFilter('NO_SALES',this)" style="background:#f1f5f9;color:#475569;border-color:#e2e8f0">
          No sales data <span id="countNoSales" class="status-count">0</span>
        </button>
        <div style="width:1px;height:20px;background:#ddd;margin:0 8px"></div>
        <label style="display:inline-flex;align-items:center;gap:6px">
          <input type="checkbox" id="toggleOnlyGateway" onchange="toggleOnlyGateway(this.checked)" />
          Only with Gateway stock
        </label>
        <label style="display:inline-flex;align-items:center;gap:6px">
          <input type="checkbox" id="toggleOnlyConfigured" onchange="toggleOnlyConfigured(this.checked)" />
          Only configured
        </label>
        <div style="flex:1"></div>
        <button class="search-btn-small" type="button" onclick="printGw()">Print</button>
      </div>
    </div>

    <div id="gwPrintHeader" class="print-header small-note" aria-hidden="true">Gateway → Main Report</div>

    <div class="table-wrapper">
      <table class="app-table" id="gwTable">
        <thead>
          <tr>
            <th>SKU</th>
            <th>Product</th>
            <th>Pickface</th>
            <th>Capacity</th>
            <th style="white-space:nowrap">Pickface Stk</th>
            <th style="white-space:nowrap">Total MW</th>
            <th style="white-space:nowrap">Gateway Stk</th>
            <th style="white-space:nowrap">AVG/mth</th>
            <th style="white-space:nowrap">Weeks Avail.</th>
          </tr>
        </thead>
        <tbody id="gwTbody"><tr><td colspan="9" style="text-align:center;opacity:.7">Loading…</td></tr></tbody>
      </table>
    </div>

    <div id="gwPagination" class="pager" style="display:flex;justify-content:flex-end;align-items:center;gap:8px;margin-top:8px">
      <button id="gwPrevPage" class="pages-btn" type="button" aria-label="Previous page" onclick="gwPrevPage()">‹</button>
      <span id="gwPageInfo" class="small-note">Page 1 / 1</span>
      <button id="gwNextPage" class="pages-btn" type="button" aria-label="Next page" onclick="gwNextPage()">›</button>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-inner">© 2025 JSlab.dev — All rights reserved.</div>
  </footer>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
    /* ── Scoped styles ── */
    (function(){
      const css = `
  .chip{padding:4px 10px;border:1px solid var(--border,#cbd5e1);border-radius:999px;background:#fff;color:#0f172a;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .2s ease;opacity:1}
  .status-count{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:18px;padding:0 5px;border-radius:999px;font-size:10px;font-weight:700;line-height:1;background:rgba(0,0,0,.15);color:currentColor}
  #gwFilters.has-active .chip:not(.active){opacity:.35;filter:grayscale(.6);transform:scale(.96)}
  #gwFilters.has-active .chip:not(.active):hover{opacity:.6;filter:grayscale(.3);transform:scale(1)}
  .chip.active{border-width:2px;font-weight:700;transform:scale(1.05);box-shadow:0 2px 8px rgba(0,0,0,.15)}
  #gwTable th,#gwTable td{text-align:center}
  .weeks-badge{display:inline-block;font-size:12px;padding:2px 8px;border-radius:999px;line-height:1;border:1px solid transparent;font-weight:600;font-variant-numeric:tabular-nums}
  .weeks-badge.critical{background:#fee2e2;color:#b91c1c;border-color:#fecaca}
  .weeks-badge.low{background:#fef3c7;color:#b45309;border-color:#fde68a}
  .weeks-badge.ok{background:#dcfce7;color:#15803d;border-color:#bbf7d0}
  .weeks-badge.good{background:#dbeafe;color:#1d4ed8;border-color:#bfdbfe}
  .weeks-badge.none{background:#f1f5f9;color:#64748b;border-color:#e2e8f0}
  .pager button[disabled]{opacity:.5;cursor:not-allowed}
  @media print{.pager{display:none!important}}
  .print-header{display:none}
  @media print{
    html,body{background:#fff!important;color:#000!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    body *{visibility:hidden}
    header.site-header,footer.site-footer,#gwFilters,.header-actions,.site-footer,#syncStatusCard{display:none!important}
    .print-header,.table-wrapper,.table-wrapper *{visibility:visible}
    .print-header{position:relative}
    .table-wrapper{position:relative;background:#fff!important;box-shadow:none!important}
    #gwTable{font-size:11px;border-collapse:collapse;background:#fff!important}
    #gwTable th,#gwTable td{border:1px solid #333!important;padding:6px 8px!important}
    #gwTable thead th{background:#f3f4f6!important;color:#111827!important}
    thead{display:table-header-group}
    tr{break-inside:avoid;page-break-inside:avoid}
    .print-header{display:block;font-size:12px;color:#0f172a;font-weight:600;margin:0 0 6px;text-align:center}
    .weeks-badge{background:transparent!important;border-color:#999!important;color:#111!important}
  }
  @page{size:A4 landscape;margin:12mm}
      `;
      const s = document.createElement('style'); s.textContent = css; document.head.appendChild(s);
    })();

    /* ── Print ── */
    function printGw(){
      const stamp = formatNow();
      const ph = document.getElementById('gwPrintHeader');
      if(ph) ph.textContent = `Gateway → Main Report — ${stamp}`;
      const prevTitle = document.title;
      document.title = `Gateway-Main ${formatNowForFile()}`;
      setTimeout(()=> window.print(), 0);
      window.addEventListener('afterprint', function restore(){ document.title = prevTitle; window.removeEventListener('afterprint', restore); });
    }
    function formatNow(){ const d=new Date(),p=n=>String(n).padStart(2,'0'); return `${p(d.getDate())}/${p(d.getMonth()+1)}/${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())}`; }
    function formatNowForFile(){ const d=new Date(),p=n=>String(n).padStart(2,'0'); return `${p(d.getDate())}-${p(d.getMonth()+1)}-${d.getFullYear()} ${p(d.getHours())}.${p(d.getMinutes())}`; }

    /* ── Filter chip clicks ── */
    window.setWeeksFilter = function(val, el){
      if(window.gwSetWeeksFilter) window.gwSetWeeksFilter(val);
      const fc = document.getElementById('gwFilters');
      document.querySelectorAll('#gwFilters .chip[data-weeks-filter]').forEach(b=>b.classList.remove('active'));
      if(el){ el.classList.add('active'); fc && (val && val!=='ALL' ? fc.classList.add('has-active') : fc.classList.remove('has-active')); }
    };
    window.toggleOnlyGateway = function(f){ if(window.gwToggleOnlyGateway) window.gwToggleOnlyGateway(f); };
    window.toggleOnlyConfigured = function(f){ if(window.gwToggleOnlyConfigured) window.gwToggleOnlyConfigured(f); };
  </script>

  <script src="gateway-main.js"></script>
</body>
</html>
